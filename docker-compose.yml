services:
  postgres:
    image: postgres:16-alpine
    container_name: metriq-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: metriq
    volumes:
      - metriq_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d metriq"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  metriq_pgdata:
